#cloud-config
#
# Add this as cloud-init userdata when creating Proxmox base template
# Proxmox: Datacenter > VM > Cloud-Init > User Data (or via API)
#
# This will download and start the agent on first boot of every clone
#
# Security config:
#   ALLOWED_IPS      - comma-separated list of IPs/CIDRs allowed to call the agent
#   ALLOWED_SCRIPTS  - comma-separated list of URL prefixes for allowed scripts
#   AUTO_DISABLE     - set to "true" to disable agent after successful provision

runcmd:
  - |
    AGENT_VERSION="latest"
    AGENT_BASE_URL="https://github.com/LeAnhlinux/proxmox-template/releases"
    INSTALL_SCRIPT_URL="https://raw.githubusercontent.com/LeAnhlinux/proxmox-template/main/scripts/install-agent.sh"
    AGENT_PORT=8080
    ALLOWED_IPS="103.130.216.137"
    ALLOWED_SCRIPTS="https://raw.githubusercontent.com/LeAnhlinux/proxmox-template/"
    AUTO_DISABLE="true"
    curl -fsSL "${INSTALL_SCRIPT_URL}" | \
      AGENT_VERSION="${AGENT_VERSION}" \
      AGENT_BASE_URL="${AGENT_BASE_URL}" \
      AGENT_PORT="${AGENT_PORT}" \
      ALLOWED_IPS="${ALLOWED_IPS}" \
      ALLOWED_SCRIPTS="${ALLOWED_SCRIPTS}" \
      AUTO_DISABLE="${AUTO_DISABLE}" \
      bash
